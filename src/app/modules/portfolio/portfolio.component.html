<!-- Loading State -->
<div *ngIf="state.loading()" class="min-h-screen bg-background text-foreground flex items-center justify-center font-sans">
  <div class="flex flex-col items-center gap-4">
    <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
    <p class="text-sm font-semibold text-muted-foreground tracking-wide animate-pulse">Loading profile...</p>
  </div>
</div>

<!-- Error State -->
<div *ngIf="state.error() && !state.loading()" class="min-h-screen bg-background text-foreground flex items-center justify-center p-6 font-sans relative overflow-hidden">
  <!-- Decorative background blobs -->
  <div class="decorative-blob-tl"></div>
  <div class="decorative-blob-br"></div>

  <div class="relative w-full max-w-md glass-card rounded-[2rem] p-5 text-center z-10">
    <div class="w-12 h-12 bg-destructive/10 text-destructive rounded-2xl flex items-center justify-center mx-auto mb-6 border border-destructive/20">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
      </svg>
    </div>
    <h2 class="font-serif text-2xl font-extrabold mb-3 text-destructive">Profile Not Found</h2>
    <p class="text-muted-foreground text-xs leading-relaxed mb-8 font-medium">
      The portfolio you requested doesn't exist or isn't available. Please check the URL.
    </p>
  </div>
</div>

<!-- Main Portfolio Content -->
<div *ngIf="!state.loading() && !state.error() && state.portfolioData()"
     class="min-h-screen bg-background text-foreground font-sans transition-colors duration-300"
     [class.dark]="theme.isDark()">

  <app-header></app-header>

  <main class="pt-16">
    <app-hero *ngIf="state.isSectionVisible('hero')"></app-hero>
    <app-expertise *ngIf="state.isSectionVisible('expertise')"></app-expertise>
    <app-skills *ngIf="state.isSectionVisible('skills')"></app-skills>
    <app-experience *ngIf="state.isSectionVisible('experience')"></app-experience>
    <app-projects *ngIf="state.isSectionVisible('projects')"></app-projects>
    <app-education *ngIf="state.isSectionVisible('education')"></app-education>
    <app-contact *ngIf="state.isSectionVisible('contact')"></app-contact>
  </main>

  <app-footer></app-footer>
</div>
