<section id="education" class="bg-card/60 border-t border-border py-16 fade-on-scroll" #animateOnScroll>
  <div class="max-w-5xl mx-auto px-6">
    <div>
      <p class="text-primary font-semibold text-sm uppercase tracking-widest mb-2" style="opacity: 1; transform: none">
        {{ state.educationSectionMeta()?.subtitle || 'Academic' }}
      </p>
      <h2 class="font-serif text-3xl font-extrabold mb-8" style="opacity: 1; transform: none">
        {{ state.educationSectionMeta()?.title || 'Education' }}
      </h2>
      
      <div *ngFor="let item of state.education()"
        class="bg-card border border-border rounded-2xl p-6 md:p-8 shadow-sm flex flex-col md:flex-row gap-6 items-start mb-6"
        style="opacity: 1; transform: none">
        
        <!-- Logo or Fallback -->
        <div *ngIf="item.institutionLogo?.url; else fallbackLogo" class="w-14 h-14 rounded-2xl overflow-hidden flex items-center justify-center flex-shrink-0 bg-white border border-border">
          <img [src]="item.institutionLogo.url" [alt]="item.institution" class="w-full h-full object-contain" />
        </div>
        <ng-template #fallbackLogo>
          <div class="w-14 h-14 rounded-2xl bg-primary/10 flex items-center justify-center flex-shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-code-xml w-7 h-7 text-primary" aria-hidden="true">
              <path d="m18 16 4-4-4-4"></path>
              <path d="m6 8-4 4 4 4"></path>
              <path d="m14.5 4-5 16"></path>
            </svg>
          </div>
        </ng-template>
        
        <div class="flex-1 w-full">
          <div class="flex items-start justify-between flex-wrap gap-3">
            <div class="flex-1 min-w-[200px]">
              <h3 class="font-serif font-bold text-xl text-foreground">
                {{ item.degree }}
              </h3>
              <p class="text-primary font-semibold text-sm mt-1">
                {{ item.institution }}
              </p>
              <p class="text-muted-foreground text-sm mt-0.5 flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                  class="lucide lucide-map-pin w-3.5 h-3.5" aria-hidden="true">
                  <path
                    d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0">
                  </path>
                  <circle cx="12" cy="10" r="3"></circle>
                </svg>
                {{ item.location }}
              </p>
              <p *ngIf="item.grade" class="text-sm text-foreground/80 mt-3">
                Grade / Score: {{ item.grade }}
              </p>
            </div>
            
            <div class="text-right flex-shrink-0">
              <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-primary/10 text-primary text-sm font-semibold">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                  class="lucide lucide-calendar w-3.5 h-3.5" aria-hidden="true">
                  <path d="M8 2v4"></path>
                  <path d="M16 2v4"></path>
                  <rect width="18" height="18" x="3" y="4" rx="2"></rect>
                  <path d="M3 10h18"></path>
                </svg>
                {{ item.startYear }} – {{ item.endYear || 'Present' }}
              </span>
            </div>
          </div>
        </div>
        
      </div>
    </div>
  </div>
</section>
