<div class="min-h-screen bg-background text-foreground flex font-sans">
  
  <!-- ═══ SIDEBAR ═══ -->
  <aside class="w-64 border-r border-border bg-card/60 backdrop-blur-md flex flex-col justify-between flex-shrink-0 relative z-20">
    <div>
      <!-- Brand Logo -->
      <div class="h-16 flex items-center px-6 border-b border-border/80">
        <a href="/admin/dashboard" class="font-serif font-bold text-xl tracking-tight text-foreground">
          MU<span class="text-primary">.</span> <span class="text-xs uppercase font-sans font-bold tracking-widest text-muted-foreground/60 ml-2">Console</span>
        </a>
      </div>

      <!-- Navigation Links -->
      <nav class="p-4 space-y-1">
        <a *ngFor="let item of navItems"
           [routerLink]="item.link"
           routerLinkActive="bg-primary/10 text-primary border-primary"
           class="flex items-center gap-3.5 px-4 py-3 rounded-xl text-sm font-semibold text-muted-foreground hover:text-foreground hover:bg-secondary/40 border border-transparent transition-all duration-200"
        >
          <!-- Nav Icon Box -->
          <span class="flex-shrink-0 w-8 h-8 rounded-lg bg-primary/5 text-primary flex items-center justify-center border border-primary/10 shadow-sm" [innerHTML]="item.icon"></span>
          <span class="flex-1">{{ item.label }}</span>
          
          <!-- Badge on Messages Link -->
          <span *ngIf="item.label === 'Messages' && unreadMessagesCount() > 0"
                class="px-2 py-0.5 text-[10px] font-bold rounded-full bg-primary text-primary-foreground">
            {{ unreadMessagesCount() }}
          </span>
        </a>
      </nav>
    </div>

    <!-- Sidebar Footer / Logout -->
    <div class="p-4 border-t border-border/80">
      <button (click)="onLogout()" 
              class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-destructive hover:bg-destructive/10 transition-colors border border-transparent"
      >
        <span class="flex-shrink-0 w-8 h-8 rounded-lg bg-destructive/5 text-destructive flex items-center justify-center border border-destructive/10">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" />
          </svg>
        </span>
        <span>Sign Out</span>
      </button>
    </div>
  </aside>

  <!-- ═══ MAIN PANEL ═══ -->
  <div class="flex-1 flex flex-col min-w-0 bg-background/50 relative overflow-y-auto">
    <!-- Blurred Background Decorative Blob -->
    <div class="absolute top-[-10%] right-[-10%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-[100px] pointer-events-none z-0"></div>

    <!-- Topbar -->
    <header class="h-16 border-b border-border bg-card/40 backdrop-blur-md flex items-center justify-between px-8 flex-shrink-0 relative z-10">
      <div class="flex items-center gap-3">
        <!-- Dashboard Eyebrow Indicator -->
        <span class="h-2 w-2 rounded-full bg-primary animate-pulse"></span>
        <span class="text-xs uppercase font-bold tracking-widest text-muted-foreground">Admin Session Active</span>
      </div>

      <!-- Right Profile Widgets -->
      <div class="flex items-center gap-4">
        <!-- Message Notification Indicator -->
        <a routerLink="/admin/contact-messages" class="relative p-2 text-muted-foreground hover:text-foreground transition-colors rounded-lg hover:bg-secondary/40">
          <svg class="w-5.5 h-5.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
          </svg>
          <span *ngIf="unreadMessagesCount() > 0" class="absolute top-1.5 right-1.5 h-2 w-2 rounded-full bg-primary"></span>
        </a>

        <!-- Divider -->
        <span class="h-5 w-px bg-border"></span>

        <!-- User Info -->
        <div class="flex items-center gap-3">
          <div class="text-right hidden sm:block">
            <p class="text-xs font-bold text-foreground">{{ auth.currentUser()?.name || 'Administrator' }}</p>
            <p class="text-[10px] font-medium text-muted-foreground">{{ auth.currentUser()?.email || 'admin@mohit.dev' }}</p>
          </div>
          <!-- Avatar Icon Container -->
          <div class="w-9 h-9 rounded-full bg-primary/10 border border-primary/20 text-primary flex items-center justify-center font-bold text-sm">
            {{ (auth.currentUser()?.name || 'A').charAt(0).toUpperCase() }}
          </div>
        </div>
      </div>
    </header>

    <!-- Main Child Content Frame -->
    <main class="flex-1 relative z-10 overflow-y-auto">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
