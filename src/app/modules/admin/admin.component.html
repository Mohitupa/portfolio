<div class="min-h-screen bg-background text-foreground flex font-sans">

  <!-- ═══ SIDEBAR ═══ -->
  <aside
    class="w-64 border-r border-border bg-card/60 backdrop-blur-md flex flex-col justify-between flex-shrink-0 relative z-20">
    <div>
      <!-- Brand Logo -->
      <div class="h-16 flex items-center px-6 border-b border-border/80">
        <a href="/admin/dashboard" class="font-serif font-bold text-xl tracking-tight text-foreground">
          MU<span class="text-primary">.</span> <span
            class="text-xs uppercase font-sans font-bold tracking-widest text-muted-foreground/60 ml-2">Console</span>
        </a>
      </div>

      <!-- Navigation Links -->
      <nav class="p-4 space-y-1">
        <a *ngFor="let item of navItems()" [routerLink]="item.link"
          routerLinkActive="bg-primary/10 text-primary border-primary font-bold" #rla="routerLinkActive"
          class="flex items-center gap-3.5 px-4 py-3 rounded-xl text-sm font-semibold text-muted-foreground hover:text-foreground hover:bg-secondary/40 border border-transparent transition-all duration-200">
          <!-- Nav Icon Box -->
          <span
            class="flex-shrink-0 w-8 h-8 rounded-lg text-primary flex items-center justify-center border transition-all duration-200"
            [ngClass]="{
              'bg-primary/10 border-primary/20': rla.isActive,
              'bg-primary/5 border-primary/10': !rla.isActive
            }">
            <!-- Dashboard Icon -->
            <svg *ngIf="item.label === 'Dashboard'" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
              stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" />
            </svg>
            <!-- Portfolios Icon -->
            <svg *ngIf="item.label === 'Portfolios'" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
              stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.25 12.75V12A2.25 2.25 0 0 1 4.5 9.75h15A2.25 2.25 0 0 1 21.75 12v.75m-19.5 0A2.25 2.25 0 0 0 4.5 15h15a2.25 2.25 0 0 0 2.25-2.25m-19.5 0v3.75A2.25 2.25 0 0 0 4.5 18.75h15a2.25 2.25 0 0 0 2.25-2.25v-3.75M9 3h6m-3 0v6" />
            </svg>
            <!-- Media Icon -->
            <svg *ngIf="item.label === 'Media'" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
              stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
            </svg>
            <!-- Messages Icon -->
            <svg *ngIf="item.label === 'Messages'" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
              stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
            </svg>
            <!-- Admin Users Icon -->
            <svg *ngIf="item.label === 'Admin Users'" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
              stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.109A11.386 11.386 0 0 1 10.089 18a11.374 11.374 0 0 1-4.833-2.507c-.443-.377-.738-.931-.738-1.547v-.337A4.125 4.125 0 0 1 12 9.75a4.125 4.125 0 0 1 8.136 2.507c0 .616-.295 1.17-.738 1.547v.337a4.125 4.125 0 0 1-4.398 4.004M15 9.75a4.125 4.125 0 0 0 0-8.25 4.125 4.125 0 0 0 0 8.25ZM9.75 8.25a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM6 12.75a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Z" />
            </svg>
            <!-- Settings Icon -->
            <svg *ngIf="item.label === 'Settings'" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
              stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M4.5 12a7.5 7.5 0 0 0 15 0m-15 0a7.5 7.5 0 1 1 15 0" />
            </svg>
          </span>
          <span class="flex-1 p-2">{{ item.label }}</span>

          <!-- Badge on Messages Link -->
          <span
            *ngIf="item.label === 'Messages' && auth.hasPermission('contact.read') && unreadMessagesCount() > 0"
            class="px-2 py-0.5 text-[10px] font-bold rounded-full bg-primary text-primary-foreground shadow-sm">
            {{ unreadMessagesCount() }}
          </span>
        </a>
      </nav>
    </div>

    <!-- Sidebar Footer / Logout -->
    <div class="p-4 border-t border-border/80">
      <button (click)="onLogout()"
        class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-destructive hover:bg-destructive/10 transition-colors border border-transparent">
        <span
          class="flex-shrink-0 w-8 h-8 rounded-lg bg-destructive/5 text-destructive flex items-center justify-center border border-destructive/10">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" />
          </svg>
        </span>
        <span>Sign Out</span>
      </button>
    </div>
  </aside>

  <!-- ═══ MAIN PANEL ═══ -->
  <div class="flex-1 flex flex-col min-w-0 bg-background/50 relative overflow-y-auto">
    <!-- Blurred Background Decorative Blob -->
    <div
      class="absolute top-[-10%] right-[-10%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-[100px] pointer-events-none z-0">
    </div>

    <!-- Topbar -->
    <header
      class="h-16 border-b border-border bg-card/40 backdrop-blur-md flex items-center justify-between px-8 flex-shrink-0 relative z-10">
      <div class="flex items-center gap-3">
        <!-- Dashboard Eyebrow Indicator -->
        <span class="h-2 w-2 rounded-full bg-primary animate-pulse"></span>
        <span class="text-xs uppercase font-bold tracking-widest text-muted-foreground">Admin Session Active</span>
      </div>

      <!-- Right Profile Widgets -->
      <div class="flex items-center gap-4">
        <!-- Message Notification Indicator -->
        <a routerLink="/admin/contact-messages"
          class="relative p-2 text-muted-foreground hover:text-foreground transition-colors rounded-lg hover:bg-secondary/40">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
          </svg>
          <span *ngIf="unreadMessagesCount() > 0"
            class="absolute top-1.5 right-1.5 h-2 w-2 rounded-full bg-primary"></span>
        </a>

        <!-- Divider -->
        <span class="h-5 w-px bg-border"></span>

        <!-- User Info -->
        <div class="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity">
          <div class="text-right hidden sm:block">
            <p class="text-xs font-bold text-foreground">{{ auth.currentUser()?.name || 'Administrator' }}</p>
            <p class="text-[10px] font-medium text-muted-foreground flex items-center gap-1">
              {{ auth.currentUser()?.email || 'admin@mohit.dev' }}
              <!-- Chevron Down -->
              <svg class="w-3 h-3 text-muted-foreground/80" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
              </svg>
            </p>
          </div>
          <!-- Avatar Icon Container -->
          <div
            class="w-9 h-9 rounded-full bg-primary/10 border border-primary/20 text-primary flex items-center justify-center font-bold text-sm shadow-sm">
            {{ (auth.currentUser()?.name || 'A').charAt(0).toUpperCase() }}
          </div>
        </div>
      </div>
    </header>

    <!-- Main Child Content Frame -->
    <main class="flex-1 relative z-10 overflow-y-auto">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
