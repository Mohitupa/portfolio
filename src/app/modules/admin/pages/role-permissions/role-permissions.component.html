<div class="admin-page">
  <div class="admin-page-header">
    <div>
      <p class="text-xs uppercase tracking-widest font-bold text-primary mb-2">Access Control</p>
      <h1 class="font-serif text-3xl font-extrabold text-foreground tracking-tight">Role Permissions</h1>
      <p class="text-sm text-muted-foreground mt-1 font-medium">
        Assign permissions for role ID: <span class="font-bold text-foreground">{{ roleId() }}</span>
      </p>
    </div>

    <a
      *appHasPermission="'role.read'"
      routerLink="/admin/roles"
      class="admin-header-button inline-flex items-center justify-center gap-2 rounded-full border border-border bg-card/40 hover:bg-secondary/40 text-sm font-bold transition-opacity"
    >
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/>
      </svg>
      <span>Back</span>
    </a>
  </div>

  <div *ngIf="loading()" class="p-5 admin-list-grid">
    <div *ngFor="let item of [1,2,3,4]" class="h-28 rounded-3xl bg-muted/40 animate-pulse"></div>
  </div>

  <section *ngIf="!loading()" class="bg-card/40 backdrop-blur-md border border-border/80 rounded-3xl shadow-sm p-5 mt-4">
    <div *ngIf="error()" class="mb-4 p-3 rounded-2xl border border-destructive/20 bg-destructive/5 text-sm font-bold text-destructive">
      {{ error() }}
    </div>

    <div *ngFor="let group of groupedPermissions()">
      <h3 class="text-xs uppercase tracking-widest font-bold text-muted-foreground mt-4 mb-3">
        {{ group.module }}
      </h3>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <label
          *ngFor="let permission of group.permissions"
          class="inline-flex items-center gap-3 rounded-2xl border border-border/80 bg-background/40 px-4 py-3"
        >
          <input
            type="checkbox"
            class="h-4 w-4 accent-primary"
            [checked]="isChecked(permission)"
            (change)="togglePermission(permission, $event)"
          />
          <span class="text-sm font-bold text-foreground">
            {{ permission.displayName || permission.name }}
          </span>
        </label>
      </div>
    </div>

    <div class="flex flex-col gap-3 mt-6">
      <button
        type="button"
        [disabled]="saving()"
        (click)="save()"
        class="h-12 px-5 rounded-full bg-primary text-primary-foreground text-sm font-bold shadow-sm disabled:opacity-50"
      >
        {{ saving() ? 'Saving...' : 'Save' }}
      </button>
    </div>
  </section>
</div>
