<div class="min-h-screen bg-background text-foreground flex items-center justify-center p-6 relative overflow-hidden font-sans">
  <!-- Dynamic blurred background decorations -->
  <div class="decorative-blob-tl"></div>
  <div class="decorative-blob-br"></div>

  <!-- Content Card -->
  <div class="relative w-full max-w-md glass-card rounded-[2rem] p-8 md:p-10 z-10 transition-all duration-300 glass-card-hover">
    <!-- Square lock icon container -->
    <div class="w-12 h-12 bg-primary/10 text-primary rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-sm border border-primary/20">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
      </svg>
    </div>

    <p class="text-primary font-bold text-[10px] uppercase tracking-widest mb-2 text-center">SYSTEM GATEWAY</p>
    <h1 class="font-serif text-3xl font-extrabold mb-8 text-foreground tracking-tight text-center">Admin Portal</h1>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5 text-left">
      <!-- Email Control -->
      <div>
        <label for="email" class="block text-[10px] font-bold uppercase tracking-wider text-muted-foreground mb-1.5 ml-1">Email Address</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="admin@mohit.dev"
          class="w-full px-4 py-3 rounded-xl border border-border/80 bg-background/40 text-sm placeholder:text-muted-foreground/45 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200"
          [class.border-destructive]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
        />
        <p *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('required')" class="text-xs text-destructive mt-1 ml-1 font-medium">
          Email is required
        </p>
        <p *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('email')" class="text-xs text-destructive mt-1 ml-1 font-medium">
          Please enter a valid email address
        </p>
      </div>

      <!-- Password Control -->
      <div class="mt-4">
        <label for="password" class="block text-[10px] font-bold uppercase tracking-wider text-muted-foreground mb-1.5 ml-1">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="••••••••"
          class="w-full px-4 py-3 rounded-xl border border-border/80 bg-background/40 text-sm placeholder:text-muted-foreground/45 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200"
          [class.border-destructive]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
        />
        <p *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('required')" class="text-xs text-destructive mt-1 ml-1 font-medium">
          Password is required
        </p>
      </div>

      <!-- Error Alert (Inline below password input) -->
      <div *ngIf="errorMessage()" class="mt-3 p-3 rounded-xl bg-destructive/10 border border-destructive/15 text-destructive text-xs flex items-center gap-2 animate-fadeIn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5 flex-shrink-0">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
        </svg>
        <span class="font-medium">{{ errorMessage() }}</span>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="loading()"
        class="w-full flex items-center justify-center gap-2 px-6 py-3.5 mt-8 rounded-xl bg-primary text-primary-foreground font-semibold text-sm hover:bg-primary/95 transition-all shadow-md hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed p-3"
      >
        <span *ngIf="loading()" class="w-4 h-4 border-2 border-primary-foreground border-t-transparent rounded-full animate-spin"></span>
        <span>{{ loading() ? 'Authenticating...' : 'Sign In' }}</span>
      </button>

      <!-- Back Link -->
      <div class="text-center mt-6">
        <a href="/fstack" class="text-xs font-semibold text-muted-foreground hover:text-primary transition-colors">
          ← Back to Portfolio
        </a>
      </div>
    </form>
  </div>
</div>
