<div class="min-h-screen bg-background text-foreground flex items-center justify-center p-6 relative overflow-hidden font-sans">
  <!-- Dynamic blurred background decorations -->
  <div class="absolute top-[-20%] left-[-10%] w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
  <div class="absolute bottom-[-20%] right-[-10%] w-[500px] h-[500px] bg-primary/15 rounded-full blur-[120px] pointer-events-none"></div>

  <!-- Content Card -->
  <div class="relative w-full max-w-md bg-card/40 backdrop-blur-md border border-border/80 rounded-[2rem] p-8 md:p-10 shadow-2xl z-10 transition-all duration-300 hover:border-primary/30">
    <div class="w-16 h-16 bg-primary/10 text-primary rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-inner">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
      </svg>
    </div>

    <p class="text-primary font-bold text-xs uppercase tracking-widest mb-2">SYSTEM GATEWAY</p>
    <h1 class="font-serif text-3xl font-extrabold mb-8 text-foreground tracking-tight">Admin Portal</h1>

    <!-- Error Alert -->
    <div *ngIf="errorMessage()" class="mb-6 p-4 rounded-xl bg-destructive/10 border border-destructive/20 text-destructive text-sm text-left flex items-start gap-2 animate-fadeIn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 flex-shrink-0 mt-0.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
      </svg>
      <span>{{ errorMessage() }}</span>
    </div>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5 text-left">
      <!-- Email Control -->
      <div>
        <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-muted-foreground mb-1.5 ml-1">Email Address</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="admin@mohit.dev"
          class="w-full px-4 py-3 rounded-xl border border-border/80 bg-background/50 text-sm placeholder:text-muted-foreground/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200"
          [class.border-destructive]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
        />
        <p *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('required')" class="text-xs text-destructive mt-1 ml-1">
          Email is required
        </p>
        <p *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('email')" class="text-xs text-destructive mt-1 ml-1">
          Please enter a valid email address
        </p>
      </div>

      <!-- Password Control -->
      <div>
        <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-muted-foreground mb-1.5 ml-1">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="••••••••"
          class="w-full px-4 py-3 rounded-xl border border-border/80 bg-background/50 text-sm placeholder:text-muted-foreground/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200"
          [class.border-destructive]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
        />
        <p *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('required')" class="text-xs text-destructive mt-1 ml-1">
          Password is required
        </p>
        <p *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('minlength')" class="text-xs text-destructive mt-1 ml-1">
          Password must be at least 6 characters
        </p>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="loading()"
        class="w-full flex items-center justify-center gap-2 px-6 py-3.5 mt-8 rounded-xl bg-primary text-primary-foreground font-semibold text-sm hover:bg-primary/90 transition-all shadow-md hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <span *ngIf="loading()" class="w-4 h-4 border-2 border-primary-foreground border-t-transparent rounded-full animate-spin"></span>
        <span>{{ loading() ? 'Authenticating...' : 'Sign In' }}</span>
      </button>

      <!-- Back Link -->
      <div class="text-center mt-6">
        <a href="/fstack" class="text-xs font-semibold text-muted-foreground hover:text-primary transition-colors">
          ← Back to Portfolio
        </a>
      </div>
    </form>
  </div>
</div>
