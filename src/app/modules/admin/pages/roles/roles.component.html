<div class="admin-page">
  <div class="admin-page-header">
    <div>
      <p class="text-xs uppercase tracking-widest font-bold text-primary mb-2">Access Control</p>
      <h1 class="font-serif text-3xl font-extrabold text-foreground tracking-tight">Roles</h1>
      <p class="text-sm text-muted-foreground mt-1 font-medium">Create, edit, and manage CMS roles.</p>
    </div>

    <button
      *appHasPermission="'role.create'"
      type="button"
      (click)="openCreatePanel()"
      class="admin-header-button inline-flex items-center justify-center gap-2 rounded-full bg-primary text-primary-foreground text-sm font-bold shadow-sm hover:opacity-90 transition-opacity"
    >
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
      </svg>
      <span>New Role</span>
    </button>
  </div>

  <section
    *ngIf="showCreatePanel()"
    class="bg-card/50 backdrop-blur-md border border-border/80 rounded-3xl p-5 shadow-sm"
  >
    <div class="flex items-start justify-between gap-4 border-b border-border/80 pb-4 mb-5">
      <div>
        <p class="text-xs uppercase tracking-widest font-bold text-muted-foreground">Create Role</p>
        <h2 class="font-serif text-xl font-extrabold text-foreground mt-1">New role</h2>
      </div>

      <button
        type="button"
        (click)="closeCreatePanel()"
        class="w-9 h-9 rounded-full border border-border text-muted-foreground hover:text-foreground hover:bg-secondary/40 transition-colors flex items-center justify-center"
        aria-label="Close create role form"
      >
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <form [formGroup]="createForm" (ngSubmit)="createRole()" class="admin-create-grid">
      <label class="space-y-2">
        <span class="admin-label">Role Name</span>
        <input formControlName="name" class="admin-input" placeholder="SUPER_ADMIN" />
      </label>

      <label class="space-y-2">
        <span class="admin-label">Display Name</span>
        <input formControlName="displayName" class="admin-input" placeholder="Super Admin" />
      </label>

      <label class="space-y-2">
        <span class="admin-label">Description</span>
        <input formControlName="description" class="admin-input" placeholder="System role description" />
      </label>

      <label class="inline-flex items-center gap-3 rounded-2xl border border-border/80 bg-background/40 px-4 py-3">
        <input formControlName="isSystem" type="checkbox" class="h-4 w-4 accent-primary" />
        <span class="text-sm font-bold text-foreground">System Role</span>
      </label>

      <label class="space-y-2">
        <span class="admin-label">Sort Order</span>
        <input type="number" formControlName="sortOrder" class="admin-input" />
      </label>

      <div class="flex flex-col gap-3">
        <button
          *appHasPermission="'role.create'"
          type="submit"
          [disabled]="createForm.invalid || saving()"
          class="h-12 px-5 rounded-full bg-primary text-primary-foreground text-sm font-bold shadow-sm disabled:opacity-50 disabled:cursor-not-allowed"
        >
          {{ saving() ? 'Saving...' : 'Create' }}
        </button>
      </div>
    </form>
  </section>

  <div class="admin-panel-header mt-6">
    <div>
      <h2 class="font-serif text-xl font-extrabold text-foreground tracking-tight">Role List</h2>
      <p class="text-xs text-muted-foreground mt-1 font-medium">Search and manage roles.</p>
    </div>

    <div class="flex items-center gap-3">
      <input
        class="admin-input"
        [value]="search()"
        (input)="search.set(($any($event.target).value || '').toString())"
        placeholder="Search roles..."
      />
    </div>
  </div>

  <section class="bg-card/40 backdrop-blur-md border border-border/80 rounded-3xl shadow-sm overflow-hidden mt-4">
    <div *ngIf="loading() && roles().length === 0" class="p-5 admin-list-grid">
      <div *ngFor="let item of [1, 2, 3, 4]" class="h-24 rounded-3xl bg-muted/40 animate-pulse"></div>
    </div>

    <div *ngIf="!loading() && filteredRoles().length === 0" class="p-5 text-center">
      <div class="w-14 h-14 mx-auto rounded-2xl bg-primary/10 border border-primary/20 text-primary flex items-center justify-center mb-4">
        <svg class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 0 0 3.741-.479 3 3 0 0 0-4.682-2.72" />
        </svg>
      </div>
      <h3 class="font-serif text-xl font-extrabold text-foreground">No roles found</h3>
      <p class="text-sm text-muted-foreground mt-1">Create a new role to get started.</p>
    </div>

    <div *ngIf="filteredRoles().length > 0" class="admin-list-grid p-5">
      <article
        *ngFor="let role of filteredRoles(); trackBy: trackRole"
        class="rounded-3xl border border-border/80 bg-background/40 p-5 hover:border-primary/30 hover:bg-primary/5 transition-all"
      >
        <div class="flex items-start justify-between gap-4 mb-3">
          <div class="min-w-0">
            <h3 class="font-serif text-xl font-extrabold text-foreground truncate">
              {{ role.displayName || role.name }}
            </h3>
            <p class="text-xs font-semibold text-muted-foreground truncate mt-1">
              Role Name: {{ role.name }}
            </p>
          </div>

          <span class="px-2.5 py-1 rounded-full bg-background/70 border border-border text-[10px] font-bold text-foreground whitespace-nowrap">
            {{ role.isSystem ? 'System' : 'Custom' }}
          </span>
        </div>

        <div class="mt-5 flex flex-wrap gap-2">
          <a
            *appHasPermission="'role-permission.read'"
            [routerLink]="['/admin/roles', roleId(role), 'permissions']"
            class="inline-flex items-center gap-2 px-4 py-2 rounded-full border border-border text-xs font-bold text-foreground hover:bg-secondary/40"
          >
            Manage Permissions
          </a>

          <button
            *appHasPermission="'role.delete'"
            type="button"
            (click)="deleteRole(role)"
            class="inline-flex items-center gap-2 px-4 py-2 rounded-full border border-destructive/20 text-xs font-bold text-destructive hover:bg-destructive/10"
          >
            Delete
          </button>
        </div>
      </article>
    </div>
  </section>
</div>
